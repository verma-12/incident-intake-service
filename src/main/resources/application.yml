spring:
  application:
    name: incident-intake-service
  datasource:
    url: jdbc:h2:mem:incidents;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  h2:
    console:
      enabled: false

server:
  port: 8080

logging:
  level:
    com.example.incident: INFO
